name: Ultimate Minecraft Server (Google Drive)

on:
  workflow_dispatch: # Manual "Run" button

jobs:
  server:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      # 1. Setup Environment
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Dependencies (Playit, Rclone, JQ)
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt-get update
          sudo apt-get install playit jq zip unzip -y
          sudo -v ; curl https://rclone.org/install.sh | sudo bash

      # 2. Connect to Google Drive
      - name: Configure Google Drive
        env:
          GDRIVE_CONFIG: ${{ secrets.GDRIVE_CONFIG }}
        run: |
          mkdir -p ~/.config/rclone
          echo "$GDRIVE_CONFIG" > ~/.config/rclone/rclone.conf
          echo "✅ Google Drive Configured!"

      # 3. Restore Backup (STRICT ORIGINAL LOGIC)
      - name: 📥 Restore Backup
        run: |
          mkdir -p server/minecraft-worlds
          mkdir -p server/plugins
          
          echo "Checking Google Drive for previous backup..."
          rclone copy gdrive:MinecraftServer/backup.zip server/ || echo "No backup found. Starting Fresh!"
          
          if [ -f server/backup.zip ]; then
            echo "Backup found! Unzipping World & Plugins..."
            unzip -o server/backup.zip -d server/
            rm server/backup.zip
            touch server/BACKUP_WAS_RESTORED
          fi

      # 4. Setup Server Logic (Privacy, Seed & End Portal)
      - name: Configure Server & Folders
        env:
          SEED_SECRET: ${{ secrets.SEED }}
          END_PORTAL: ${{ secrets.END_PORTAL }}
        run: |
          echo "settings:" > server/bukkit.yml
          echo "  world-container: minecraft-worlds" >> server/bukkit.yml
          
          echo "commands:" > server/spigot.yml
          echo "  log: false" >> server/spigot.yml
          
          echo "server-port=25565" > server/server.properties
          echo "online-mode=false" >> server/server.properties
          echo "motd=SuperSMP Server" >> server/server.properties
          echo "eula=true" > server/eula.txt

          # --- END PORTAL TOGGLE ---
          if [ "$END_PORTAL" == "false" ]; then
            echo "allow-end=false" >> server/server.properties
            echo "  allow-end: false" >> server/bukkit.yml
          else
            echo "allow-end=true" >> server/server.properties
          fi
          
          # --- SEED LOGIC (STRICT ORIGINAL) ---
          if [ ! -f server/BACKUP_WAS_RESTORED ]; then
             if [ -n "$SEED_SECRET" ]; then
                echo "✅ New World Detected! Applying Secret Seed..."
                echo "level-seed=$SEED_SECRET" >> server/server.properties
             fi
          fi

      # 5. Download Core & Plugins (Smart Version Check)
      - name: Download Paper (Smart Version Check) & Plugins
        run: |
          TARGET_VERSION="1.21.11"
          PROJECT_URL="https://api.papermc.io/v2/projects/paper"
          
          if curl -s $PROJECT_URL | jq -e ".versions | index(\"$TARGET_VERSION\")" > /dev/null; then
            VERSION="$TARGET_VERSION"
            echo "✅ Targeting version $VERSION"
          else
            VERSION=$(curl -s $PROJECT_URL | jq -r '.versions[-1]')
            echo "⚠️ Version $TARGET_VERSION not found. Falling back to latest: $VERSION"
          fi
          
          BUILD=$(curl -s $PROJECT_URL/versions/$VERSION | jq '.builds[-1]')
          wget -O server/paper.jar "$PROJECT_URL/versions/$VERSION/builds/$BUILD/downloads/paper-$VERSION-$BUILD.jar"
          
          cp -r plugins/* server/plugins/

      # 6. Configure Plugins (DiscordSRV & Bedrock Nether)
      - name: 🔧 Configure Plugins
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
        run: |
          if ls server/plugins/DiscordSRV*.jar 1> /dev/null 2>&1; then
            mkdir -p server/plugins/DiscordSRV
            echo "BotToken: \"$DISCORD_TOKEN\"" > server/plugins/DiscordSRV/config.yml
            echo "Channels: {\"global\": \"1454377524250284096\"}" >> server/plugins/DiscordSRV/config.yml
            echo "DiscordConsoleChannelId: \"1433750303089623120\"" >> server/plugins/DiscordSRV/config.yml
            echo "ConfigVersion: 1.26.0" >> server/plugins/DiscordSRV/config.yml
            echo "Experiment_JdbcAccountLinkBackend: true" >> server/plugins/DiscordSRV/config.yml
          fi

          if ls server/plugins/Geyser-Spigot*.jar 1> /dev/null 2>&1; then
            mkdir -p server/plugins/Geyser-Spigot
            echo "above-bedrock-nether-building: true" > server/plugins/Geyser-Spigot/config.yml
            echo "max-build-height: 256" >> server/plugins/Geyser-Spigot/config.yml
          fi

      # 7. Start Server & Tunnel (Combined to prevent GitHub killing background processes)
      - name: 🟢 Start Server
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          # 1. Start Playit INSIDE this step so it doesn't get killed
          echo "Starting Playit tunnel..."
          if [ -z "$PLAYIT_SECRET" ]; then
            echo "⚠️ NO PLAYIT_SECRET FOUND! Generating a new claim link..."
            unset PLAYIT_SECRET
            
            # Check if playit is even installed
            which playit && echo "✅ Playit binary found" || echo "❌ Playit NOT found!"
            playit --version 2>&1 || echo "Could not get playit version"
            
            # Use 'script' to fake a TTY so playit generates the claim link
            script -qc "playit" playit_log.txt &
            PLAYIT_PID=$!
            
            # Poll for the claim link (up to 30 seconds)
            echo "Waiting for Playit to generate claim link..."
            for i in $(seq 1 6); do
              sleep 5
              CLAIM_LINK=$(grep -oE "https://playit.gg/claim/[a-zA-Z0-9]+" playit_log.txt 2>/dev/null || true)
              if [ -n "$CLAIM_LINK" ]; then
                echo ""
                echo "=========================================="
                echo "🔗 CLAIM YOUR AGENT HERE:"
                echo "$CLAIM_LINK"
                echo "=========================================="
                echo ""
                break
              fi
              echo "  ...still waiting ($((i*5))s)..."
            done
            
            # If still no link, dump the full log for debugging
            if [ -z "$CLAIM_LINK" ]; then
              echo "❌ Could not find claim link. Full Playit output:"
              cat playit_log.txt 2>/dev/null || echo "(log file empty)"
            fi
          else
            nohup playit --secret $PLAYIT_SECRET > playit_log.txt 2>&1 &
            PLAYIT_PID=$!
            echo "Playit PID: $PLAYIT_PID"
            sleep 15
          fi
          
          # 2. Show Connection Info
          echo "------------------------------------------"
          echo "🚀 YOUR MINECRAFT SERVER IS ONLINE!"
          echo "------------------------------------------"
          JAVA_IP=$(grep -oE '[a-zA-Z0-9.-]+\.joinmc\.link' playit_log.txt | head -n 1)
          echo "🖥️ JAVA IP: ${JAVA_IP:-Check playit.gg dashboard}"
          BEDROCK_INFO=$(grep -oE '[a-zA-Z0-9.-]+\.ply\.gg:[0-9]+' playit_log.txt | head -n 1)
          if [ -z "$JAVA_IP" ] && [ -z "$PLAYIT_SECRET" ]; then
             echo "⚠️ SERVER HAS NO IP! YOU MUST CLICK THE CLAIM LINK ABOVE ⚠️"
          else
             echo "📱 BEDROCK: ${BEDROCK_INFO:-Check playit.gg dashboard}"
          fi
          echo "------------------------------------------"
          echo "🎮 Logs below are only from Minecraft..."
          
          cd server
          
          # 3. Start Minecraft Server (5GB RAM to prevent OOM crashes)
          java -Xms5G -Xmx5G -XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200 -XX:+UnlockExperimentalVMOptions -XX:+DisableExplicitGC -XX:+AlwaysPreTouch -XX:G1NewSizePercent=30 -XX:G1MaxNewSizePercent=40 -XX:G1HeapRegionSize=8M -XX:G1ReservePercent=20 -XX:G1HeapWastePercent=5 -XX:G1MixedGCCountTarget=4 -XX:InitiatingHeapOccupancyPercent=15 -XX:G1MixedGCLiveThresholdPercent=90 -XX:G1OldCSetRegionThresholdPercent=5 -XX:SurvivorRatio=32 -XX:+PerfDisableSharedMem -XX:MaxTenuringThreshold=1 -Dusing.aikars.flags=https://mcflags.emc.gs -Daikars.new.flags=true -jar paper.jar nogui &
          SERVER_PID=$!
          
          # 2. Safety Timer Logic (With Warnings)
          START_TIME=$(date +%s)
          MAX_DURATION=19800 # 5.5 Hours
          
          # Flags to ensure we only warn once
          WARNED_30="false"
          WARNED_1="false"
          WARNED_COUNTDOWN="false"
          
          echo "⏳ Server started. Monitoring for 5.5 hours or manual stop..."
          
          while kill -0 $SERVER_PID 2>/dev/null; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            
            # --- WARNING 1: 30 Minutes Left (at 18000s) ---
            if [ $ELAPSED -ge 18000 ] && [ "$WARNED_30" == "false" ]; then
                echo "say ⚠️ NOTICE: Server will shutdown in 30 minutes!" > /proc/$SERVER_PID/fd/0
                WARNED_30="true"
            fi

            # --- WARNING 2: 1 Minute Left (at 19740s) ---
            if [ $ELAPSED -ge 19740 ] && [ "$WARNED_1" == "false" ]; then
                echo "say 🚨 URGENT: Server will shutdown in 1 MINUTE!" > /proc/$SERVER_PID/fd/0
                WARNED_1="true"
            fi

            # --- WARNING 3: 15s Countdown (at 19785s) ---
            if [ $ELAPSED -ge 19785 ] && [ "$WARNED_COUNTDOWN" == "false" ]; then
                WARNED_COUNTDOWN="true"
                echo "say 🚨 Countdown started..." > /proc/$SERVER_PID/fd/0
                for i in {15..1}; do
                   echo "say Server shutting down in $i..." > /proc/$SERVER_PID/fd/0
                   sleep 1
                done
                echo "say 👋 Server is closing now!" > /proc/$SERVER_PID/fd/0
            fi

            # If timer runs out (5.5 hours)
            if [ $ELAPSED -ge $MAX_DURATION ]; then
              echo "⏰ Time limit reached (5.5h). Initiating shutdown..."
              
              # Try Graceful Stop
              echo "stop" > /proc/$SERVER_PID/fd/0
              
              # Give it 60 seconds to save and close
              count=0
              while kill -0 $SERVER_PID 2>/dev/null && [ $count -lt 6 ]; do
                sleep 10
                count=$((count+1))
                echo "Waiting for save... ($((count*10))s)"
              done
              
              # If still running after 60s, FORCE KILL
              if kill -0 $SERVER_PID 2>/dev/null; then
                 echo "⚠️ Server stuck! Force killing to ensure backup..."
                 kill -9 $SERVER_PID
              fi
              break
            fi
            # Auto-restart Playit if it crashed (check every 60s)
            PLAYIT_CHECK=$((ELAPSED % 60))
            if [ "$PLAYIT_CHECK" -lt 11 ]; then
              if ! kill -0 $PLAYIT_PID 2>/dev/null; then
                echo "⚠️ Playit tunnel crashed! Restarting..."
                if [ -z "$PLAYIT_SECRET" ]; then
                   unset PLAYIT_SECRET
                   nohup playit > $GITHUB_WORKSPACE/playit_log.txt 2>&1 &
                else
                   nohup playit --secret $PLAYIT_SECRET > $GITHUB_WORKSPACE/playit_log.txt 2>&1 &
                fi
                PLAYIT_PID=$!
                sleep 15
              fi
            fi
            sleep 10
          done
          
          # 3. Final Cleanup
          wait $SERVER_PID || true
          echo "✅ Server process finished. Proceeding to backup..."

      # 8. Auto-Backup (STRICT ORIGINAL LOGIC)
      - name: 📤 Backup to Google Drive
        if: always()
        run: |
          cd server
          zip -r backup.zip minecraft-worlds plugins -x "*.jar"
          rclone copy backup.zip gdrive:MinecraftServer/
          echo "✅ Backup Complete!"

      # 9. Auto-Restart Workflow
      - name: 🔄 Auto-Restart Server
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Triggering next workflow run to restart the server..."
          gh workflow run main.yml --ref ${{ github.ref_name }}
          echo "✅ Restart triggered successfully!"
